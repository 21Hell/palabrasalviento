layout: default
---

<div class="oulipo-nodos-tool" style="max-width:900px;margin:40px auto;padding:2em;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.08);">
  <h1 style="font-family:'Times New Roman',serif;">Generador Oulipiano de Carlos</h1>
  <p>Generador de poemas usando Poesia Potencial</p>
  <form id="oulipo-form" style="margin-bottom:2em;">
    <div style="display:flex;gap:1em;flex-wrap:wrap;">
      <div>
        <label>Verbos<br><textarea id="oulipo-verbs" rows="3" style="width:140px;">gemir
ahogar</textarea></label>
      </div>
      <div>
        <label>Sustantivos<br><textarea id="oulipo-nouns" rows="3" style="width:140px;">agua
fondo
ceniza
pantalla</textarea></label>
      </div>
      <div>
        <label>Adjetivos<br><textarea id="oulipo-adjs" rows="3" style="width:140px;">oscura
virtual</textarea></label>
      </div>
      <div>
        <label>Número de nodos<br><input type="number" id="oulipo-num-nodes" min="4" max="12" value="4" style="width:60px;"></label>
      </div>
    </div>
    
    <!-- Nexos con checkboxes -->
    <div style="margin-top:1.5em;">
      <label style="font-weight:bold;">Nexos (selecciona los que quieras usar):</label>
      <div style="margin-top:0.5em;display:flex;gap:0.5em;">
        <button type="button" id="nexos-all" style="font-size:0.85em;">Todos</button>
        <button type="button" id="nexos-none" style="font-size:0.85em;">Ninguno</button>
        <button type="button" id="nexos-preposiciones" style="font-size:0.85em;">Preposiciones</button>
        <button type="button" id="nexos-conjunciones" style="font-size:0.85em;">Conjunciones</button>
        <button type="button" id="nexos-articulos" style="font-size:0.85em;">Artículos</button>
      </div>
      <div id="nexos-container" style="margin-top:0.8em;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.4em;max-height:200px;overflow-y:auto;background:#f9f9f9;padding:1em;border-radius:8px;border:1px solid #eee;"></div>
    </div>
    
    <div style="margin-top:1em;">
      <label>Tipo de conexión:<br>
        <select id="oulipo-conn-type">
          <option value="all">Todos con todos</option>
          <option value="cycle">Ciclo</option>
          <option value="cross">Cruzado</option>
          <option value="random">Aleatorio</option>
        </select>
      </label>
      <label style="margin-left:1em;">Estilo de poema:<br>
        <select id="oulipo-poem-style">
          <option value="lineal">Lineal (verso por verso)</option>
          <option value="prosa">Prosa continua</option>
          <option value="fragmento">Fragmentos</option>
          <option value="escalonado">Escalonado</option>
        </select>
      </label>
      <button type="button" id="oulipo-generate" style="margin-left:1em;">Generar</button>
    </div>
  </form>
  <div id="oulipo-nodos-visual" style="position:relative;min-height:420px;background:#f8f8f8;border-radius:10px;"></div>
  <div style="margin-top:2em;">
    <h3 style="font-family:'Times New Roman',serif;margin-bottom:0.5em;">Poema Generado</h3>
    <div id="oulipo-poem" style="background:#fafafa;padding:1.5em;border-radius:8px;font-family:Georgia,serif;font-size:1.15em;line-height:1.8;white-space:pre-line;min-height:80px;border:1px solid #eee;"></div>
  </div>
  <div style="margin-top:2em;">
    <button id="oulipo-export" style="margin-right:1em;">Exportar texto</button>
    <button id="oulipo-regenerate-poem" style="margin-right:1em;">Regenerar solo poema</button>
    <textarea id="oulipo-output" rows="5" style="width:100%;margin-top:1em;" readonly></textarea>
  </div>
</div>

<script>
// Todos los nexos del español organizados por categoría
const NEXOS_ESPANOL = {
  preposiciones: ['a', 'ante', 'bajo', 'cabe', 'con', 'contra', 'de', 'desde', 'durante', 'en', 'entre', 'hacia', 'hasta', 'mediante', 'para', 'por', 'según', 'sin', 'so', 'sobre', 'tras', 'versus', 'vía'],
  locuciones_prep: ['a causa de', 'a favor de', 'a través de', 'acerca de', 'al lado de', 'alrededor de', 'antes de', 'a pesar de', 'cerca de', 'con tal de', 'de acuerdo con', 'debajo de', 'delante de', 'dentro de', 'después de', 'detrás de', 'en busca de', 'en contra de', 'en cuanto a', 'en frente de', 'en lugar de', 'en medio de', 'en torno a', 'en vez de', 'encima de', 'frente a', 'fuera de', 'gracias a', 'junto a', 'lejos de', 'más allá de', 'por encima de', 'por medio de'],
  conjunciones_coord: ['y', 'e', 'ni', 'o', 'u', 'pero', 'mas', 'sino', 'aunque', 'sin embargo', 'no obstante', 'así que', 'por tanto', 'por consiguiente', 'entonces'],
  conjunciones_subord: ['que', 'si', 'como', 'cuando', 'donde', 'porque', 'aunque', 'mientras', 'apenas', 'conforme', 'según', 'siempre que', 'a fin de que', 'para que', 'puesto que', 'ya que', 'dado que', 'pues', 'como si', 'tan pronto como', 'antes de que', 'después de que', 'hasta que', 'desde que', 'a menos que', 'con tal de que', 'a condición de que'],
  articulos: ['el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas', 'lo'],
  otros: ['del', 'al', 'como el', 'como la', 'como un', 'como una', 'en el', 'en la', 'de la', 'de los', 'con el', 'con la', 'por el', 'por la', 'hacia el', 'hacia la', 'sobre el', 'sobre la', 'entre los', 'entre las', 'sin el', 'sin la']
};

// Inicializar checkboxes de nexos
function initNexosCheckboxes() {
  const container = document.getElementById('nexos-container');
  container.innerHTML = '';
  
  const allNexos = [];
  for (const cat in NEXOS_ESPANOL) {
    NEXOS_ESPANOL[cat].forEach(n => {
      allNexos.push({ nexo: n, cat: cat });
    });
  }
  
  allNexos.forEach(item => {
    const label = document.createElement('label');
    label.style.cssText = 'display:flex;align-items:center;gap:4px;font-size:0.9em;cursor:pointer;';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = item.nexo;
    cb.dataset.cat = item.cat;
    cb.checked = ['preposiciones', 'articulos'].includes(item.cat); // Por defecto preposiciones y artículos
    label.appendChild(cb);
    label.appendChild(document.createTextNode(item.nexo));
    container.appendChild(label);
  });
}

// Botones de selección rápida
document.getElementById('nexos-all').onclick = () => {
  document.querySelectorAll('#nexos-container input[type="checkbox"]').forEach(cb => cb.checked = true);
};
document.getElementById('nexos-none').onclick = () => {
  document.querySelectorAll('#nexos-container input[type="checkbox"]').forEach(cb => cb.checked = false);
};
document.getElementById('nexos-preposiciones').onclick = () => {
  document.querySelectorAll('#nexos-container input[type="checkbox"]').forEach(cb => {
    cb.checked = cb.dataset.cat === 'preposiciones' || cb.dataset.cat === 'locuciones_prep';
  });
};
document.getElementById('nexos-conjunciones').onclick = () => {
  document.querySelectorAll('#nexos-container input[type="checkbox"]').forEach(cb => {
    cb.checked = cb.dataset.cat === 'conjunciones_coord' || cb.dataset.cat === 'conjunciones_subord';
  });
};
document.getElementById('nexos-articulos').onclick = () => {
  document.querySelectorAll('#nexos-container input[type="checkbox"]').forEach(cb => {
    cb.checked = cb.dataset.cat === 'articulos' || cb.dataset.cat === 'otros';
  });
};

function getSelectedNexos() {
  const nexos = [];
  document.querySelectorAll('#nexos-container input[type="checkbox"]:checked').forEach(cb => {
    nexos.push(cb.value);
  });
  return nexos.length > 0 ? nexos : ['y', 'con', 'en', 'de']; // fallback
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickWords(verbs, nouns, adjs, n) {
  let pool = shuffle([
    ...verbs.map(w=>({w, t:'verbo'})),
    ...nouns.map(w=>({w, t:'sustantivo'})),
    ...adjs.map(w=>({w, t:'adjetivo'}))
  ]);
  let out = [];
  let used = {verbo:0, sustantivo:0, adjetivo:0};
  for(let i=0;i<n;i++) {
    let next = pool.shift();
    if(!next) break;
    out.push(next);
    used[next.t]++;
  }
  return out;
}

function makeEdges(n, type) {
  let edges = [];
  if(type==='all') {
    for(let i=0;i<n;i++) for(let j=0;j<n;j++) if(i!==j) edges.push([i,j]);
  } else if(type==='cycle') {
    for(let i=0;i<n;i++) edges.push([i,(i+1)%n]);
  } else if(type==='cross') {
    for(let i=0;i<n;i++) edges.push([i,(i+2)%n]);
  } else if(type==='random') {
    for(let i=0;i<n;i++) {
      let j = i;
      while(j===i) j = Math.floor(Math.random()*n);
      edges.push([i,j]);
    }
    for(let k=0;k<Math.max(1,Math.floor(n/2));k++) {
      let a = Math.floor(Math.random()*n), b=a;
      while(b===a) b = Math.floor(Math.random()*n);
      edges.push([a,b]);
    }
  }
  return edges;
}

function renderNodos(words, edges) {
  const visual = document.getElementById('oulipo-nodos-visual');
  visual.innerHTML = '';
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','oulipo-connections');
  svg.style.position = 'absolute';
  svg.style.inset = '0';
  svg.style.width = '100%';
  svg.style.height = '100%';
  svg.style.pointerEvents = 'none';
  svg.style.overflow = 'visible';
  svg.style.zIndex = '1';
  visual.appendChild(svg);
  const nodes = [];
  words.forEach((w,i)=>{
    const div = document.createElement('div');
    div.className = 'oulipo-nodo';
    div.textContent = w.w;
    div.dataset.idx = i;
    div.style.position = 'absolute';
    div.style.background = 'rgba(0,0,0,0.85)';
    div.style.color = '#fff';
    div.style.padding = '0.8em 1em';
    div.style.borderRadius = '8px';
    div.style.fontFamily = 'Georgia,serif';
    div.style.fontSize = '1.1em';
    div.style.boxShadow = '0 6px 18px rgba(0,0,0,0.18)';
    div.style.cursor = 'grab';
    div.style.userSelect = 'none';
    div.style.zIndex = 2;
    visual.appendChild(div);
    nodes.push(div);
  });
  // random positions
  const crect = visual.getBoundingClientRect();
  const placed = [];
  nodes.forEach(n => {
    const width = 120 + Math.random()*60;
    const height = 40 + Math.random()*20;
    const maxW = Math.max(20, visual.offsetWidth - width - 20);
    const maxH = Math.max(20, visual.offsetHeight - height - 20);
    let left, top, tries = 0;
    do {
      left = Math.random() * maxW + 20;
      top = Math.random() * maxH + 20;
      const rect = { left, top, right: left + width, bottom: top + height };
      const overlapping = placed.some(p => !(rect.right < p.left || rect.left > p.right || rect.bottom < p.top || rect.top > p.bottom));
      if(!overlapping) break;
      tries++;
    } while(tries < 30);
    n.style.left = left + 'px';
    n.style.top = top + 'px';
    placed.push({ left: left, top: top, right: left + width, bottom: top + height });
  });
  // draw edges
  function getCenter(el){
    const rect = el.getBoundingClientRect();
    const crect = visual.getBoundingClientRect();
    return { x: rect.left - crect.left + rect.width/2, y: rect.top - crect.top + rect.height/2 };
  }
  edges.forEach(pair => {
    const a = getCenter(nodes[pair[0]]);
    const b = getCenter(nodes[pair[1]]);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', a.x);
    line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x);
    line.setAttribute('y2', b.y);
    line.setAttribute('stroke', 'rgba(0,0,0,0.18)');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  });
  // drag
  nodes.forEach(node => {
    node.addEventListener('pointerdown', startDrag);
    node.style.touchAction = 'none';
  });
  let dragEl = null, startX=0, startY=0, origX=0, origY=0;
  function startDrag(e){
    dragEl = e.currentTarget;
    nodes.forEach(nd => nd.style.zIndex = 2);
    dragEl.style.zIndex = 9999;
    dragEl.setPointerCapture(e.pointerId);
    const rect = dragEl.getBoundingClientRect();
    const crect = visual.getBoundingClientRect();
    startX = e.clientX; startY = e.clientY;
    origX = rect.left - crect.left;
    origY = rect.top - crect.top;
    dragEl.style.cursor = 'grabbing';
    dragEl.style.transition = 'none';
    dragEl.addEventListener('pointermove', onDrag);
    dragEl.addEventListener('pointerup', endDrag);
    dragEl.addEventListener('pointercancel', endDrag);
  }
  function onDrag(e){
    if(!dragEl) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    let nx = origX + dx;
    let ny = origY + dy;
    nx = Math.max(0, Math.min(nx, visual.offsetWidth - dragEl.offsetWidth));
    ny = Math.max(0, Math.min(ny, visual.offsetHeight - dragEl.offsetHeight));
    dragEl.style.left = nx + 'px';
    dragEl.style.top = ny + 'px';
    // redraw lines
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    edges.forEach(pair => {
      const a = getCenter(nodes[pair[0]]);
      const b = getCenter(nodes[pair[1]]);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', a.x);
      line.setAttribute('y1', a.y);
      line.setAttribute('x2', b.x);
      line.setAttribute('y2', b.y);
      line.setAttribute('stroke', 'rgba(0,0,0,0.18)');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('stroke-linecap', 'round');
      svg.appendChild(line);
    });
  }
  function endDrag(e){
    if(!dragEl) return;
    try{ dragEl.releasePointerCapture(e.pointerId); }catch(_){}
    dragEl.style.cursor = 'grab';
    dragEl.style.transition = '';
    dragEl.removeEventListener('pointermove', onDrag);
    dragEl.removeEventListener('pointerup', endDrag);
    dragEl.removeEventListener('pointercancel', endDrag);
    dragEl.style.zIndex = 2;
    dragEl = null;
  }
}

document.getElementById('oulipo-generate').onclick = function(){
  const verbs = document.getElementById('oulipo-verbs').value.split(/\n|,/).map(w=>w.trim()).filter(Boolean);
  const nouns = document.getElementById('oulipo-nouns').value.split(/\n|,/).map(w=>w.trim()).filter(Boolean);
  const adjs = document.getElementById('oulipo-adjs').value.split(/\n|,/).map(w=>w.trim()).filter(Boolean);
  const nexos = getSelectedNexos();
  const n = Math.max(4, Math.min(12, parseInt(document.getElementById('oulipo-num-nodes').value)||4));
  const connType = document.getElementById('oulipo-conn-type').value;
  const poemStyle = document.getElementById('oulipo-poem-style').value;
  const words = pickWords(verbs, nouns, adjs, n);
  const edges = makeEdges(words.length, connType);
  renderNodos(words, edges);
  // Generate poem with nexos
  const poem = generatePoem(words, nexos, poemStyle);
  document.getElementById('oulipo-poem').innerHTML = poem;
  // output
  let txt = words.map(w=>w.w).join(' - ');
  document.getElementById('oulipo-output').value = txt + '\n\n--- Poema ---\n' + poem.replace(/<br>/g, '\n').replace(/&nbsp;/g, ' ').replace(/<[^>]+>/g, '');
};

function generatePoem(words, nexos, style) {
  const wordList = words.map(w => w.w);
  const shuffledWords = shuffle([...wordList]);
  const shuffledNexos = shuffle([...nexos]);
  
  let poem = '';
  
  if (style === 'lineal') {
    // Verso por verso: palabra + nexo + palabra
    for (let i = 0; i < shuffledWords.length; i++) {
      const nexo = shuffledNexos[i % shuffledNexos.length];
      const nextWord = shuffledWords[(i + 1) % shuffledWords.length];
      poem += shuffledWords[i] + ' ' + nexo + ' ' + nextWord + '<br>';
    }
  } else if (style === 'prosa') {
    // Prosa continua
    let parts = [];
    for (let i = 0; i < shuffledWords.length; i++) {
      parts.push(shuffledWords[i]);
      if (i < shuffledWords.length - 1) {
        parts.push(shuffledNexos[i % shuffledNexos.length]);
      }
    }
    poem = parts.join(' ') + '.';
  } else if (style === 'fragmento') {
    // Fragmentos poéticos
    const chunks = [];
    for (let i = 0; i < shuffledWords.length; i += 2) {
      const w1 = shuffledWords[i];
      const w2 = shuffledWords[i + 1] || shuffledWords[0];
      const nexo = shuffledNexos[Math.floor(Math.random() * shuffledNexos.length)];
      chunks.push(w1 + ' ' + nexo + ' ' + w2);
    }
    poem = chunks.join('<br><br>');
  } else if (style === 'escalonado') {
    // Escalonado visual
    let indent = 0;
    for (let i = 0; i < shuffledWords.length; i++) {
      const spaces = '&nbsp;'.repeat(indent * 4);
      const nexo = shuffledNexos[i % shuffledNexos.length];
      if (i < shuffledWords.length - 1) {
        poem += spaces + shuffledWords[i] + ' ' + nexo + '<br>';
      } else {
        poem += spaces + shuffledWords[i];
      }
      indent = (indent + 1) % 4;
    }
  }
  
  return poem;
}

document.getElementById('oulipo-regenerate-poem').onclick = function(){
  const verbs = document.getElementById('oulipo-verbs').value.split(/\n|,/).map(w=>w.trim()).filter(Boolean);
  const nouns = document.getElementById('oulipo-nouns').value.split(/\n|,/).map(w=>w.trim()).filter(Boolean);
  const adjs = document.getElementById('oulipo-adjs').value.split(/\n|,/).map(w=>w.trim()).filter(Boolean);
  const nexos = getSelectedNexos();
  const n = Math.max(4, Math.min(12, parseInt(document.getElementById('oulipo-num-nodes').value)||4));
  const poemStyle = document.getElementById('oulipo-poem-style').value;
  const words = pickWords(verbs, nouns, adjs, n);
  const poem = generatePoem(words, nexos, poemStyle);
  document.getElementById('oulipo-poem').innerHTML = poem;
  // update output
  let txt = words.map(w=>w.w).join(' - ');
  document.getElementById('oulipo-output').value = txt + '\n\n--- Poema ---\n' + poem.replace(/<br>/g, '\n').replace(/&nbsp;/g, ' ').replace(/<[^>]+>/g, '');
};

document.getElementById('oulipo-export').onclick = function(){
  const txt = document.getElementById('oulipo-output').value;
  navigator.clipboard.writeText(txt);
  alert('Texto copiado al portapapeles');
};

// Inicializar nexos y generar
initNexosCheckboxes();
setTimeout(()=>{
  document.getElementById('oulipo-generate').click();
}, 200);
</script>
