

<head>
	<meta charset="utf-8">
	<title>{{ page.title | default: site.title }}</title>
	<meta name="description" content="{{ page.excerpt | strip_html | default: site.description }}">
	{% if page.robots %}<meta name="robots" content="{{ page.robots }}">{% endif %}
	<meta property="og:title" content="{{ page.title | default: site.title }}" />
	<meta property="og:description" content="{{ page.excerpt | strip_html | default: site.description }}" />
	<meta property="og:type" content="article" />
	<meta property="og:url" content="{{ page.url | absolute_url }}" />
	<meta property="og:image" content="{{ page.image | default: site.image | absolute_url }}" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="{{ page.title | default: site.title }}" />
	<meta name="twitter:description" content="{{ page.excerpt | strip_html | default: site.description }}" />
	<meta name="twitter:image" content="{{ page.image | default: site.image | absolute_url }}" />
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
	<link rel="stylesheet" href="{{ '/assets/css/ensayos-lista.css' | relative_url }}">
	<link rel="stylesheet" href="{{ '/assets/css/footer.css' | relative_url }}">
	<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
	
</head>
<body>
{% include nav.html %}
{{ content }}
<footer class="site-footer">
	<div class="footer-content">
		<div class="footer-license">
			<h3>📜 CC BY 4.0</h3>
			<p>Todo bajo <strong><a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">Creative Commons Atribución 4.0</a></strong>. Autor: <strong>Carlos Wolf</strong> - <a href="https://github.com/21Hell/palabrasalviento" target="_blank" rel="noopener">GitHub</a></p>
			<a href="https://creativecommons.org/licenses/by/4.0/deed.es" title="Creative Commons Atribución 4.0">
				<img src="https://licensebuttons.net/l/by/4.0/80x15.png" alt="CC BY 4.0" style="margin-top: 0.3em;">
			</a>
		</div>
	</div>
</footer>


</body>
